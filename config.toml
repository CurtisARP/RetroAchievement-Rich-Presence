# RA Discord Rich Presence Configuration
# Edit this file with your RetroAchievements and Discord credentials

# REQUIRED: Your RetroAchievements username (or set RA_USERNAME env var)
username = ""

# REQUIRED: Your RetroAchievements Web API key (or set RA_API_KEY env var)
api_key = ""

# REQUIRED: Discord Application Client ID (or set DISCORD_CLIENT_ID env var)
discord_client_id = ""

# How often to poll RA API (in seconds). Default: 45
poll_interval_secs = 45

# Idle timeout before clearing presence (in seconds). Default: 300
idle_timeout_secs = 300

# Log level: debug, info, warn, error. Default: info
log_level = "info"

# RA API endpoint (usually no need to change)
ra_base_url = "https://retroachievements.org/API/API_GetUserSummary.php"

# Number of recent games to fetch from RA. Default: 5
ra_recent_games = 5

# Number of recent achievements to fetch from RA. Default: 5
ra_recent_achievements = 5

# Show buttons in Discord presence. Default: true
presence_buttons = true

# Custom large image key (optional, requires assets uploaded to Discord app)
presence_large_image_key = null